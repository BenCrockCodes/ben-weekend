<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#05010e">
  <title>NEOVOLT — Neon Rhythm Platformer</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='2' y='2' width='12' height='12' rx='2' fill='%2300f0ff'/%3E%3Crect x='5' y='5' width='6' height='6' fill='%23ff2ea6'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <!-- WebGL game canvas — everything in-world is drawn here -->
  <canvas id="game-canvas"></canvas>

  <!-- DOM UI layer sits on top of the canvas -->
  <div id="ui-root">

    <!-- ============ HUD (visible while playing) ============ -->
    <div id="hud" class="screen" data-screen="hud">
      <div id="progress-wrap" aria-label="Level progress">
        <div id="progress-track">
          <div id="progress-fill"></div>
          <div id="progress-cube"></div>
          <div id="progress-finish"></div>
        </div>
        <div id="progress-pct">0%</div>
      </div>
      <div id="hud-coins">
        <span class="hud-coin" data-coin="0"></span>
        <span class="hud-coin" data-coin="1"></span>
        <span class="hud-coin" data-coin="2"></span>
      </div>
      <button id="btn-pause" class="icon-btn" aria-label="Pause">&#10074;&#10074;</button>
      <div id="attempt-label">ATTEMPT&nbsp;1</div>
    </div>

    <!-- ============ MAIN MENU (official-level carousel) ============ -->
    <section id="screen-menu" class="screen menu-screen" data-screen="menu">
      <button id="account-chip" title="Account & profile">&#9672; SIGN IN</button>
      <div class="menu-inner">
        <h1 id="logo">NEO<span>VOLT</span></h1>
        <p id="tagline">A NEON RHYTHM PLATFORMER</p>
        <div id="level-carousel" aria-label="Official levels">
          <button id="car-prev" class="car-arrow" aria-label="Previous level">&#8249;</button>
          <div id="car-card"><!-- rendered by ui.js --></div>
          <button id="car-next" class="car-arrow" aria-label="Next level">&#8250;</button>
        </div>
        <nav class="menu-row" aria-label="Menu">
          <button class="menu-pill" data-action="character">&#9671; CHARACTER</button>
          <button class="menu-pill" data-action="community">&#127760; COMMUNITY</button>
          <button class="menu-pill" data-action="mylevels">&#9998; CREATE</button>
        </nav>
        <div class="menu-corner">
          <button class="btn corner-btn" data-action="settings">&#9881; SETTINGS</button>
          <button class="btn corner-btn" data-action="leaderboards">&#9650; LEADERBOARDS</button>
        </div>
      </div>
    </section>

    <!-- ============ COMMUNITY HUB ============ -->
    <section id="screen-community" class="screen menu-screen" data-screen="community">
      <div class="menu-inner wide">
        <header class="screen-head">
          <button class="btn btn-back" data-action="menu">&larr;</button>
          <h2>COMMUNITY</h2>
        </header>
        <div id="weekly-banner"><!-- weekly level, rendered by ui.js --></div>
        <nav class="com-tiles" aria-label="Community">
          <button class="com-tile" data-action="search">
            <i>&#128269;</i><b>SEARCH</b><small>Name, creator, difficulty</small>
          </button>
          <button class="com-tile" data-action="ugc">
            <i>&#127760;</i><b>ALL LEVELS</b><small>Everything published</small>
          </button>
          <button class="com-tile" data-action="mylevels">
            <i>&#9998;</i><b>CREATE</b><small>Your level workspace</small>
          </button>
          <button class="com-tile" data-action="recent">
            <i>&#8635;</i><b>RECENT</b><small>Recently played</small>
          </button>
        </nav>
      </div>
    </section>

    <!-- ============ SEARCH LEVELS ============ -->
    <section id="screen-search" class="screen menu-screen" data-screen="search">
      <div class="menu-inner wide">
        <header class="screen-head">
          <button class="btn btn-back" data-action="community">&larr;</button>
          <h2>SEARCH LEVELS</h2>
        </header>
        <div id="search-scroll">
          <div id="search-grid"></div>
          <div class="ugc-foot">
            <p id="search-status" class="ugc-status" role="status"></p>
            <button id="search-more" class="btn" hidden>LOAD MORE</button>
          </div>
        </div>
        <!-- filter bar: designed so future filters (song, length, rating…)
             are one more .search-filter block -->
        <form id="search-filters" class="search-filters">
          <label class="search-filter">
            <span>NAME</span>
            <input id="sf-name" type="search" placeholder="Level name&hellip;" maxlength="24" autocomplete="off">
          </label>
          <label class="search-filter">
            <span>CREATOR</span>
            <input id="sf-creator" type="search" placeholder="Creator&hellip;" maxlength="16" autocomplete="off">
          </label>
          <label class="search-filter">
            <span>DIFFICULTY</span>
            <select id="sf-difficulty">
              <option value="">ANY</option>
              <option>Easy</option><option>Normal</option>
              <option>Hard</option><option>Insane</option><option>Custom</option>
            </select>
          </label>
          <button type="submit" class="btn btn-primary search-go">SEARCH</button>
        </form>
      </div>
    </section>

    <!-- ============ RECENTLY PLAYED ============ -->
    <section id="screen-recent" class="screen menu-screen" data-screen="recent">
      <div class="menu-inner wide">
        <header class="screen-head">
          <button class="btn btn-back" data-action="community">&larr;</button>
          <h2>RECENTLY PLAYED</h2>
        </header>
        <div id="recent-list"></div>
      </div>
    </section>

    <!-- ============ MAIN LEVELS ============ -->
    <section id="screen-levels" class="screen menu-screen" data-screen="levels">
      <div class="menu-inner wide">
        <header class="screen-head">
          <button class="btn btn-back" data-action="menu">&larr;</button>
          <h2>MAIN LEVELS</h2>
        </header>
        <div id="level-cards"><!-- populated by ui.js --></div>
      </div>
    </section>

    <!-- ============ USER GENERATED LEVELS (online) ============ -->
    <section id="screen-ugc" class="screen menu-screen" data-screen="ugc">
      <div class="menu-inner wide">
        <header class="screen-head">
          <button class="btn btn-back" data-action="community">&larr;</button>
          <h2>ALL UPLOADED LEVELS</h2>
        </header>
        <div class="ugc-controls">
          <input id="ugc-search" type="search" placeholder="Search community levels&hellip;"
                 maxlength="24" autocomplete="off" aria-label="Search community levels">
          <select id="ugc-sort" aria-label="Sort levels">
            <option value="newest">NEWEST</option>
            <option value="popular">MOST PLAYED</option>
            <option value="top">TOP RATED</option>
            <option value="name">A&ndash;Z</option>
          </select>
        </div>
        <div id="ugc-scroll">
          <div id="ugc-grid"><!-- level cards from ui.js --></div>
          <div class="ugc-foot">
            <p id="ugc-status" class="ugc-status" role="status"></p>
            <button id="ugc-more" class="btn">LOAD MORE</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ============ MY CREATED LEVELS ============ -->
    <section id="screen-mylevels" class="screen menu-screen" data-screen="mylevels">
      <div class="menu-inner wide">
        <header class="screen-head">
          <button class="btn btn-back" data-action="community">&larr;</button>
          <h2>CREATE LEVEL</h2>
          <button class="btn btn-primary" data-action="new-level">+ CREATE NEW</button>
        </header>
        <div id="mylevel-list"><!-- populated by ui.js --></div>
      </div>
    </section>

    <!-- ============ ACCOUNT / PROFILES (online) ============ -->
    <section id="screen-account" class="screen menu-screen" data-screen="account">
      <div class="menu-inner wide">
        <header class="screen-head">
          <button class="btn btn-back" data-action="menu">&larr;</button>
          <h2>ACCOUNT</h2>
        </header>
        <div id="account-body"><!-- rendered by accountUI.js --></div>
      </div>
    </section>

    <!-- ============ LEADERBOARDS ============ -->
    <section id="screen-leaderboards" class="screen menu-screen" data-screen="leaderboards">
      <div class="menu-inner wide">
        <header class="screen-head">
          <button class="btn btn-back" data-action="menu">&larr;</button>
          <h2>LEADERBOARDS</h2>
        </header>
        <div class="lb-tabs" role="tablist">
          <button class="lb-tab on" data-lb="triangles">&#9650; TRIANGLES</button>
          <button class="lb-tab" data-lb="creator_points">&#9733; CREATOR POINTS</button>
          <button class="lb-tab" data-lb="local">&#9632; MY PROGRESS</button>
        </div>
        <div id="lb-table"><!-- populated by ui.js --></div>
      </div>
    </section>

    <!-- ============ CHARACTER CUSTOMISATION ============ -->
    <section id="screen-character" class="screen menu-screen" data-screen="character">
      <div class="menu-inner wide">
        <header class="screen-head">
          <button class="btn btn-back" data-action="menu">&larr;</button>
          <h2>CHARACTER</h2>
        </header>
        <div id="char-body"><!-- rendered by characterUI.js --></div>
      </div>
    </section>

    <!-- ============ SETTINGS (modal) ============ -->
    <section id="screen-settings" class="screen modal-screen" data-screen="settings">
      <div class="modal-box">
        <h2>SETTINGS</h2>
        <label class="slider-row">
          <span>MUSIC</span>
          <input type="range" id="vol-music" min="0" max="100" value="70">
        </label>
        <label class="slider-row">
          <span>SFX</span>
          <input type="range" id="vol-sfx" min="0" max="100" value="80">
        </label>
        <label class="toggle-row">
          <span>SCREEN SHAKE</span>
          <input type="checkbox" id="opt-shake" checked>
          <i class="toggle-pill"></i>
        </label>
        <button class="btn btn-primary" data-action="close-settings">DONE</button>
      </div>
    </section>

    <!-- ============ PAUSE (modal) ============ -->
    <section id="screen-pause" class="screen modal-screen" data-screen="pause">
      <div class="modal-box">
        <h2>PAUSED</h2>
        <button class="btn btn-primary" data-action="resume">RESUME</button>
        <button class="btn" data-action="restart">RESTART</button>
        <button class="btn" data-action="settings">SETTINGS</button>
        <button class="btn btn-danger" data-action="quit">QUIT TO MENU</button>
      </div>
    </section>

    <!-- ============ VICTORY (modal) ============ -->
    <section id="screen-victory" class="screen modal-screen" data-screen="victory">
      <div class="modal-box victory-box">
        <h2 class="victory-title">LEVEL COMPLETE!</h2>
        <p id="victory-level-name"></p>
        <div class="victory-stats">
          <div class="vstat"><span class="vstat-label">COMPLETION</span><span id="v-pct" class="vstat-value">100%</span></div>
          <div class="vstat"><span class="vstat-label">COINS</span><span id="v-coins" class="vstat-value">0/3</span></div>
          <div class="vstat"><span class="vstat-label">BEST</span><span id="v-best" class="vstat-value">100%</span></div>
          <div class="vstat"><span class="vstat-label">ATTEMPTS</span><span id="v-attempts" class="vstat-value">1</span></div>
        </div>
        <p id="v-triangles" class="v-triangles" hidden>&#9650; +0 TRIANGLES</p>
        <button class="btn btn-primary btn-big" data-action="continue">CONTINUE</button>
      </div>
    </section>

    <!-- ============ LEVEL EDITOR ============ -->
    <section id="screen-editor" class="screen" data-screen="editor">
      <div id="editor-viewport"></div>   <!-- pointer surface over the canvas -->
      <div id="ed-top"></div>            <!-- project controls -->
      <div id="ed-left"></div>           <!-- tools -->
      <div id="ed-right"></div>          <!-- properties -->
      <div id="ed-bottom"></div>         <!-- object palette -->
      <div id="ed-status"></div>         <!-- coords / zoom readout -->
      <div id="ed-modals"></div>         <!-- settings / colours / music / load -->
      <div id="ed-context"></div>        <!-- right-click menu -->
      <div id="ed-toasts"></div>         <!-- transient notifications -->
    </section>

    <!-- Rotate-your-device overlay for portrait phones -->
    <div id="rotate-overlay"><div class="rotate-msg">&#8634;<br>ROTATE YOUR DEVICE</div></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
